name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-wasm-${{ hashFiles('src-tauri/Cargo.lock') }}-${{ steps.rust-toolchain.outputs.cachekey }}

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build WASM artifacts (needed for type-check)
        run: npm run wasm:build && npm run dds:ensure

      - name: Type-check & test
        run: |
          npm run check
          npm run test:run
          npm run lint

      - name: Build
        run: npm run build
